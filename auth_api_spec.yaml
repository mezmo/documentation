    post:
      operationId: postAuthServiceAccountList
      summary: Create a new service account
      tags:
        - service account
      description: >-
        Create a new service account for granting access to non-human parties.

        If the `roles` and `permissions` properties are omitted, the resulting
        service

        account will default to **admin** level permissions.

        Otherwise, if either property is present, the specified level of access

        will be honored.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              title: Service Account
              description: >-
                A service account is a special type of account intended to
                represent a

                non-human user that needs to authenticate and be authorized to
                access data in APIs.
              properties:
                roles:
                  type: array
                  maxItems: 50
                  description: A list of role identifiers to grant to the service account
                  items:
                    type: string
                    maxLength: 24
                  uniqueItems: true
                  example:
                    - 159dfba7c717453d623498f3
                    - b52a8b1f4da14a0bbdee6fd7
                name:
                  type: string
                  minLength: 3
                  maxLength: 128
                  pattern: ^[a-zA-Z0-9_\-.\[\]() ]+$
                  description: A user friendly, name for a service account.
                  example: Terraform Provider Pipeline Provisioning
                expire_after:
                  type: number
                  format: int32
                  nullable: true
                  minimum: 1
                  maximum: 365
                  default: null
                  description: The number of days after which tokens issued by a service account
                    will expire.
                  example: 14
                description:
                  type: string
                  nullable: true
                  maxLength: 250
                  default: null
                  description: Additional information to provide further context around the use
                    cases for the service account.
                  example: Used for provisioning pipelines via terraform
                permissions:
                  $ref: "#/components/schemas/permissions-request"
              required:
                - name
        description: >-
          A service account is a special type of account intended to represent a

          non-human user that needs to authenticate and be authorized to access
          data in APIs.
