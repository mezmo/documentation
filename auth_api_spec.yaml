      operationId: putAuthServiceAccountDetail
      summary: Update a service account with new roles and permissions
      tags:
        - service account
      description: Update a service account for granting access to non-human parties
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              title: Service Account
              description: >-
                A service account is a special type of account intended to
                represent a

                non-human user that needs to authenticate and be authorized to
                access data in APIs.
              properties:
                name:
                  type: string
                  minLength: 3
                  maxLength: 128
                  pattern: ^[a-zA-Z0-9_\-.\[\]() ]+$
                  description: A user friendly, name for a service account.
                  example: Terraform Provider Pipeline Provisioning
                description:
                  type: string
                  nullable: true
                  maxLength: 250
                  default: null
                  description: Additional information to provide further context around the use
                    cases for the service account.
                  example: Used for provisioning pipelines via terraform
                roles:
                  type: array
                  maxItems: 25
                  description: A list of role identifiers to grant to the service account
                  items:
                    type: string
                    maxLength: 24
                  uniqueItems: true
                  default: []
                  example:
                    - 6172b46c06e6ee60aa847035
                    - cc80c0f7c14a51c3dfb2db95
                permissions:
                  $ref: "#/components/schemas/permissions-request"
              required:
                - name
