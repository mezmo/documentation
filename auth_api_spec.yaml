              maxItems: 1000
              items:
                type: object
                title: Detailed error information
                properties:
                  message:
                    type: string
                    title: Specific error details
                    maxLength: 255
                    example: Account not found
                  code:
                    type: string
                    title: Machine readable error code
                    maxLength: 255
                    example: ECONTRACT
