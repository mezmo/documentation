    put:
      operationId: putAuthRoleDetail
      summary: Update a single role
      tags:
        - role
      description: Update a role associated with account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              title: Role
              description: Roles represent a set of permissions to resources which applying to
                a user/ an access token
              properties:
                permissions:
                  $ref: "#/components/schemas/permissions-request"
                name:
                  type: string
                  minLength: 2
                  maxLength: 128
                  description: A user friendly, name for a specific role.
                  example: Support
                roles:
                  type: array
                  maxItems: 25
                  uniqueItems: true
                  items:
                    type: string
                    maxLength: 24
                    description: A parent role id which permissions will be inherited
                  example:
                    - 5b8fa85cb59ba49d588942b3
                context_filter:
                  type: array
                  maxItems: 25
                  uniqueItems: true
                  description: >-
                    Users beloning to this role will have the queries found in
                    this field

                    applied as additional filters to search queries the perform
                    to constrain

                    the data the have access to.
                  items:
                    type: string
                    maxLength: 500
                    description: Search query to be applied as additional pre-filters when searching
                      logs
                  example:
                    - namespace:(default OR support) level:-debug
                    - app:-secret
              required:
                - name
                - roles
        description: Roles represent a set of permissions to resources which applying to
          a user/ an access token
