    user-set-roles-bulk-entity:
      type: object
      title: User Set Roles Bulk Entity
      description: Request body for bulk operations on users
      properties:
        account_id:
          type: string
          description: The unique identifier of the account to update
          minLength: 1
          maxLength: 24
          example: f1b433ddc2b17b79083d0b6a
        user_id:
          type: string
          description: The unique identifier of the user to update
          minLength: 1
          maxLength: 24
          example: de80e088c6403302be9b3286
        join_account:
          type: boolean
          description: If true, the user will be joined to the account if not already a
            member
          default: false
        roles:
          type: array
          maxItems: 50
          uniqueItems: true
          items:
            type: string
            maxLength: 24
            description: The unique identifier of the role to grant to the user
            example: 0c3d1b3100406003106d0435
        permissions:
          $ref: "#/components/schemas/permissions"
      required:
        - account_id
        - user_id
        - roles
