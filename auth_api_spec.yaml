    role:
      type: object
      additionalProperties: false
      title: Role
      description: Roles represent a set of permissions to resources which applying to
        a user/ an access token
      properties:
        role_id:
          type: string
          maxLength: 24
          description: A value that uniquely identiries the role.
          example: 5b7ca8b2b59ba49d58cc79ac
        account_id:
          type: string
          maxLength: 24
          nullable: true
          description: A value that uniquely identifies the account a role is associated
            with.
          example: 5b7180e8b59ba49d5883e7bd
        name:
          type: string
          minLength: 2
          maxLength: 128
          description: A user friendly, name for a specific role.
          example: Support
        slug:
          type: string
          minLength: 2
          maxLength: 128
          description: A role unique code generated automatically from role name
          example: support
        system:
          type: boolean
          description: Indicator if a role is managed by the mezmo plaform
          default: false
        internal:
          type: boolean
          description: Indicator that a role is strictly for use by internal platform
            processes
          default: false
        roles:
          type: array
          maxItems: 25
          uniqueItems: true
          items:
            type: string
            maxLength: 24
            description: A parent role id which permissions will be inherited
          example:
            - 5b8fa85cb59ba49d588942b3
        permissions:
          $ref: "#/components/schemas/permissions"
        context_filter:
          type: array
          maxItems: 25
          uniqueItems: true
          description: >-
            Users beloning to this role will have the queries found in this
            field

            applied as additional filters to search queries the perform to
            constrain

            the data the have access to.
          items:
            type: string
            maxLength: 500
            description: Search query to be applied as additional pre-filters when searching
              logs
          example:
            - namespace:(default OR support) level:-debug
            - app:-secret
        created_at:
          type: string
          maxLength: 35
          format: date-time
          description: Timestamp indicating the moment the role was originally created.
          example: 2026-07-16T17:04:52.197Z
        modified_at:
          type: string
          maxLength: 35
          format: date-time
          nullable: true
          description: Timestamp indicating the moment the role was last altered in some way
          example: 2026-07-16T17:04:52.197Z
      required:
        - role_id
        - name
        - slug
        - roles
        - created_at
        - modified_at
    service-account:
      type: object
      title: Service Account
      description: >-
        A service account is a special type of account intended to represent a

        non-human user that needs to authenticate and be authorized to access
        data in APIs.
      properties:
        service_account_id:
          type: string
          maxLength: 24
          description: A value that uniquely identiries the service account.
          example: 8c013fb99b7ae893c2427e4c
        account_id:
          type: string
          maxLength: 24
          description: A value that uniquely identifies the account a service accountis
            associated with.
          example: 7221741f25112286a3739168
        enterprise_id:
          type: string
          maxLength: 24
          description: A value that uniquely identifies the enterprise a service accountis
            associated with.
          example: 20766f388b
        token_id:
          type: string
          maxLength: 24
          description: A value that uniquely identifies the service account access token.
          example: a38e8a4d7a1119bd88dbb823
        name:
          type: string
          minLength: 3
          maxLength: 128
          pattern: ^[a-zA-Z0-9_\-.\[\]() ]+$
          description: A user friendly, name for a service account.
          example: Terraform Provider Pipeline Provisioning
        expire_after:
          type: number
          format: int32
          nullable: true
          minimum: 1
          maximum: 365
          default: null
          description: The number of days after which tokens issued by a service account
            will expire.
          example: 14
        description:
          type: string
          nullable: true
          maxLength: 250
          default: null
          description: Additional information to provide further context around the use
            cases for the service account.
          example: Used for provisioning pipelines via terraform
        roles:
          type: array
          maxItems: 25
          description: A list of role identifiers to grant to the service account
          items:
            type: string
            maxLength: 24
          uniqueItems: true
          default: []
          example:
            - 6172b46c06e6ee60aa847035
            - cc80c0f7c14a51c3dfb2db95
        permissions:
          $ref: "#/components/schemas/permissions-request"
        access_token:
          $ref: "#/components/schemas/accesstoken"
        created_at:
          type: string
          maxLength: 35
          format: date-time
          description: Timestamp indicating the moment the service account was originally
            created.
          example: 2026-07-16T17:04:52.198Z
        modified_at:
          type: string
          maxLength: 35
          format: date-time
          nullable: true
          default: null
          description: Timestamp indicating the moment the service account was last
            altered in some way
          example: 2026-07-16T17:04:52.198Z
      required:
        - service_account_id
        - token_id
        - name
        - access_token
        - created_at
        - modified_at
    token-auth-headers:
      type: object
      title: Auth Headers
      description: Authorization header to verify request
      properties:
        authorization:
          type: string
          description: Value indicating the bearer token for authentication
          format: regex
          maxLength: 60
          pattern: ^Token st[ase]_[0-9a-f]{40}$
      required:
        - authorization
    user:
      type: object
      title: User
      description: |-
        Represents an individual human and is used in
        registration, authentication and authorization.
      properties:
        user_id:
          type: string
          maxLength: 24
          description: Unique identifier which can be used to reference a specific user.
          example: ec98ac29a25790135fd0fee6
        firstname:
          type: string
          maxLength: 50
          description: Name of user given to them upon birth.
          example: John
        lastname:
          type: string
          maxLength: 50
          description: Common family or surname of the user.
          example: Doe
        email:
          type: string
          format: email
          maxLength: 320
          description: >-
            Used primarily as a means of authentication during login.

            Additionally, this is the address where platform emails intended for
            the user

            will be sent.
          example: member@snippetfactory.com
        name:
          type: string
          maxLength: 125
          description: Full name of the user. Generally the combination of firstname and
            lastname.
          example: John Doe
        accounts:
          type: array
          items:
            type: string
            maxLength: 20
          maxItems: 1000
          description: |-
            List of short account id which indicate all accounts
            under which a user is a member of.
          example:
            - bd197763ec
            - 10db02c219
        enterprise_ids:
          type: array
          items:
            type: string
            maxLength: 20
          maxItems: 50
          description: |-
            List of ids which indicate all enterprise accounts
            under which a user is a member of.
          example:
            - 953577b9d6
            - d4e126884d
        verified:
          type: boolean
          description: >-
            Indication of wheather the user has completed the registration
            process

            and confirmed to be a legitimate permison.
          example: true
        isbanned:
          type: boolean
          description: Indication if the user has been restricted from using the platform.
          example: true
        bandetails:
          description: Additional contextual information as to why the user was banned.
          type: object
          properties:
            bannedat:
              type: string
              format: date-time
              maxLength: 35
              description: Timestamp of when the bad was initially issued.
              example: 2026-07-16T17:04:52.199Z
            banreason:
              type: string
              maxLength: 256
              description: Primary motivation behind initially issuing the ban
              example: Unprofessional Conduct
            bannedby:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 320
                  nullable: true
                  description: Name of the user whom issued the original ban.
                  example: Jand Doe
                email:
                  type: string
                  maxLength: 320
                  format: email
                  description: Email address of the user whom issued the original ban.
                  example: admin@snippetfactory.com
        roles:
          type: array
          items:
            type: string
            maxLength: 24
            pattern: ^[a-f\d]{24}$
          maxItems: 50
          description: A list of role identifiers which granted to the user
          example:
            - 9f270795817e897da5d20a12
            - 749b360071358c46dfd80561
        permissions:
          $ref: "#/components/schemas/permissions"
    bulk-request:
      type: array
      title: Bulk operation request
      description: List of operations to be performed
      uniqueItems: true
      minItems: 1
      maxItems: 1000
      items:
        type: object
        properties:
          pk:
            type: string
            description: The unique identifer of a resporce
            minLength: 24
            maxLength: 24
          operation:
            type: string
            description: The operation to be performed
            enum:
              - create
              - update
              - delete
        required:
          - pk
          - operation
    multi-status-response:
      type: object
      title: Multi status response
      description: An http response which may contain errored and succeed operations list
      properties:
        success:
          type: array
          description: A list of succeed operations
          maxItems: 1000
          items:
            $ref: "#/components/schemas/multi-status-item"
        error:
          type: array
          description: A list of failed operations
          maxItems: 1000
          items:
            $ref: "#/components/schemas/multi-status-item"
      required:
        - success
        - error
    multi-status-item:
      type: object
      title: Multi status response item
      description: An object which represents a result of performed operation
      properties:
        message:
          type: string
          maxLength: 200
          description: A message describing the nature of the error or failure
        pk:
          type: string
          maxLength: 24
          description: The primary key of the resource on which the operation has been
            performed
        operation:
          type: string
          description: The operation to be performed
          enum:
            - delete
        status:
          type: integer
          minimum: 200
          maximum: 599
          format: int32
          description: The HTTP status code the item is associated with
        code:
          type: string
          maxLength: 35
          description: A textual classifier of the error or failure
      required:
        - pk
        - operation
        - status
