                        type: string
                        maxLength: 24
                        description: A value that uniquely identifies the service account access token.
                        example: a38e8a4d7a1119bd88dbb823
                      name:
                        type: string
                        minLength: 3
                        maxLength: 128
                        pattern: ^[a-zA-Z0-9_\-.\[\]() ]+$
                        description: A user friendly, name for a service account.
                        example: Terraform Provider Pipeline Provisioning
                      expire_after:
                        type: number
                        format: int32
                        nullable: true
                        minimum: 1
                        maximum: 365
                        default: null
                        description: The number of days after which tokens issued by a service account
