                  - setting
                  - shared_source
                  - signing_key
                  - sink
                  - source
                  - streaming
                  - team
                  - template_library
                  - trace
                  - usage_quota
                  - user
                  - user_profile
                  - variable_retention
                  - view
                example: access_token
              subject:
                type: string
                maxLength: 60
                description: Either one of and acces key, or the unique id of an user, or
                  service account
                example: 7e82075ebb3d164549bce34d
              permission:
