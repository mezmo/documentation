openapi: 3.0.3
info:
  title: Auth API
  description: Service for managing AuthN/AuthZ functionality
  version: v3
  contact:
    name: Mezmo
    email: support@mezmo.com
    url: https://mezmo.com/support
components:
  securitySchemes:
    AccessToken:
      type: apiKey
      name: Authorization
      in: header
    DelegateAccount:
      type: apiKey
      name: x-delegate-account-id
      in: header
  schemas:
    accesstoken:
      type: object
      additionalProperties: false
      title: Access Token
      description: Access Tokens represent a fixed level of access to the platform for
        a specific user
      properties:
        user_id:
          type: string
          maxLength: 24
          description: A value that uniquely identifies the user an access token is
            associated with.
          example: e4223369465600b9dd3d682a
        account_id:
          type: string
          maxLength: 24
          description: A value that uniquely identifies the account an access token is
            associated with.
          example: 91662d0b81cba98a03a62908
        enterprise_id:
          type: string
          maxLength: 24
          description: A value that uniquely identifies the enterprise an access tokenis
            associated with.
          example: 4fcbe50e90
        expire_at:
          type: string
          maxLength: 35
          format: date-time
          nullable: true
          description: Date value at which time the access token will be invalidated.
          example: 2026-07-16T17:04:52.192Z
        name:
          type: string
          minLength: 3
          maxLength: 128
          description: A user friendly, unique name for a specific access key.
          example: My First Access Key
        trailer:
          type: string
          minLength: 4
          maxLength: 4
          description: The tail end of the public key. For display and easy identification
          example: a3f1
        type:
          type: string
          enum:
            - access
            - service
            - enterprise
          default: access
          description: Denotes the indended usage of the access token.
        token_id:
          type: string
          maxLength: 24
          description: A value that uniquely identiries the access token.
          example: 9bd52a5b528e54020ed82b6d
        roles:
          type: array
          maxItems: 50
          description: A list of role identifiers to grant to the access token
          items:
            type: string
            maxLength: 24
          example:
            - 1abbfc4c35b48cc15c2d321d
            - 5b43ac69406c7f8e9cc44877
        permissions:
          $ref: "#/components/schemas/permissions-request"
        created_at:
          type: string
          maxLength: 35
          format: date-time
          description: Timestamp indicating the moment the token was originally created.
          example: 2026-07-16T17:04:52.193Z
        modified_at:
          type: string
          maxLength: 35
          format: date-time
          nullable: true
          description: Timestamp indicating the moment the token was last altered in some
            way
          example: 2026-07-16T17:04:52.193Z
        last_used_at:
          type: string
          maxLength: 35
          format: date-time
          nullable: true
          description: Timestamp indicating the moment the token was last used to
            authenticate a request.
          example: 2026-07-16T17:04:52.193Z
      required:
        - name
        - trailer
        - token_id
        - created_at
        - modified_at
        - last_used_at
    account:
      type: object
      title: Account
      description: |-
        Represents a platform level account
        registration, authentication and authorization.
      properties:
        account:
          type: string
          maxLength: 24
          description: A shorthand identifier for the associated account
          example: 2356ddf59c
        account_id:
          type: string
          maxLength: 24
          description: Identifier for the associated account
          example: 9615053eb962573113b8922f
        external_id:
          type: string
          maxLength: 24
          description: Identifier for the associated account
          example: 2855e373ab5a4e8bce0625dd
        company:
          type: string
          maxLength: 250
          description: Name of the company which owns the account
          example: Snippet Factory
        deactivated:
          type: string
          maxLength: 35
          format: date-time
          nullable: true
          description: Indicates if the account has been deactivated or not
          example: 2026-07-16T17:04:52.194Z
        owneremail:
          type: string
          maxLength: 320
          format: email
          description: Email address of account owner
          example: admin@snippetfactory.com
        plan:
          type: object
          additionalProperties: true
          description: Billing plan and associated feature information pertaining
        status:
          type: string
          enum:
            - active
            - deactivated
            - pending
          description: Indication the account's current activation state
          example: active
        quota:
          type: object
          additionalProperties: true
          description: Quota information pertaining to the account
          properties:
            retention:
              type: integer
              minimum: 0
              maximum: 90
              format: int32
              description: Data retention policy information pertaining to the account
              example: 14
        created:
          type: string
          maxLength: 35
          format: date-time
          description: Indicates when the account was created
        meta:
          type: object
          description: Metadata about the account
          additionalProperties: true
    check-permission-item:
      type: object
      title: Check permission item
      description: Information about a permission check request or response
      additionalProperties: false
      properties:
        resource:
          type: string
          description: The resource to check permission for
          enum:
            - access_token
            - account
            - alert
            - archiving
            - audit
            - billing
            - board
            - category
            - custom_parsing
            - data
            - deployment
            - diagnostic
            - domain
            - enterprise
            - exclusion
            - homepage_widget
            - index_rate_alert
            - ingest_instruction
            - ingest_key
            - integration
            - investigation
            - log
            - metric
            - owner
            - pipeline
            - processor
            - processor_group
            - profile
            - rehydration
            - replication
            - role
            - screen
            - service_account
            - setting
            - shared_source
            - signing_key
            - sink
            - source
            - streaming
            - team
            - template_library
            - trace
            - usage_quota
            - user
            - user_profile
            - variable_retention
            - view
          example: access_token
        subject:
          type: string
          maxLength: 60
          description: Either one of and acces key, or the unique id of an user, or
            service account
          example: 7e82075ebb3d164549bce34d
        permission:
          type: string
          description: The permission to check
          enum:
            - read
            - write
            - manage
        has_permission:
          type: boolean
          description: The sign to indicate if permission exists
          example: true
      required:
        - resource
        - subject
        - permission
