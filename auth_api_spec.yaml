    user-bulk-operations-request:
      type: object
      title: User Bulk Operations Request
      description: Request body for bulk operations on users
      properties:
        operations:
          type: array
          minItems: 1
          maxItems: 100
          description: List of bulk operations
          items:
            type: object
            title: Bulk Operation
            description: Represents a single bulk operation on an entity
            allOf:
              - if:
                  properties:
                    action:
                      enum:
                        - UPDATE
                        - DELETE
                      type: string
                then:
                  required:
                    - entity_id
              - if:
                  properties:
                    action:
                      enum:
                        - CREATE
                        - UPDATE
                      type: string
                then:
                  required:
                    - entity
            properties:
              operation_id:
                type: string
                title: Client generated id to associate operation with result
                description: >-
                  Used for navigation only, not persisted in database.

                  If not provided, the array index (as string) will be used in
                  the response
                maxLength: 125
                example: da31f70252d683eede1068d0
              action:
                type: string
                enum:
                  - UPDATE
                description: Operation type (enum, not extensible)
              entity_id:
                type: string
                title: Entity unique identifier
                description: |-
                  The identifier of the entity for UPDATE and DELETE operations.
                  MUST be null or omitted for CREATE operations
                maxLength: 24
                example: 0636d942a38638aeb6516eeb
              entity:
                $ref: "#/components/schemas/user-set-roles-bulk-entity"
            required:
              - action
      required:
        - operations
    bulk-operation-user:
      type: object
      title: Bulk Operation
      description: Represents a single bulk operation on an entity
      allOf:
        - if:
            properties:
              action:
                enum:
                  - UPDATE
                  - DELETE
                type: string
          then:
            required:
              - entity_id
        - if:
            properties:
              action:
                enum:
                  - CREATE
                  - UPDATE
                type: string
          then:
            required:
              - entity
      properties:
        operation_id:
          type: string
          title: Client generated id to associate operation with result
          description: >-
            Used for navigation only, not persisted in database.

            If not provided, the array index (as string) will be used in the
            response
          maxLength: 125
          example: da31f70252d683eede1068d0
        action:
          type: string
          enum:
            - UPDATE
          description: Operation type (enum, not extensible)
        entity_id:
          type: string
          title: Entity unique identifier
          description: |-
            The identifier of the entity for UPDATE and DELETE operations.
            MUST be null or omitted for CREATE operations
          maxLength: 24
          example: 0636d942a38638aeb6516eeb
        entity:
          $ref: "#/components/schemas/user-set-roles-bulk-entity"
      required:
        - action
    user-bulk-operations-response:
      type: object
      title: User Bulk Operations Response
      description: Response body for bulk operations on users
      properties:
        status:
          type: string
          enum:
            - SUCCEEDED
            - FAILED
            - PARTIAL
          title: Overall status of the bulk operation
        operations:
          type: array
          title: List of bulk operations
          description: |-
            Results for each operation from the request.
            Should be in the same order as the request operations
          items:
            type: object
            title: Bulk Operation Result
            description: Represents the result of a single bulk operation on an entity
            properties:
              operation_id:
                type: string
                title: Matching operation_id or index from request
                description: |-
                  Matches the operation_id from the request if provided,
                  otherwise the index of the operation as a string
                maxLength: 255
                example: c5afa04bacd94662951a6f69
              action:
                type: string
                enum:
                  - UPDATE
                description: Operation type (enum, not extensible)
              entity_id:
                type: string
                title: Entity identifier
                description: Entity identifier for UPDATE / DELETE operations
                maxLength: 50
                example: 676405eb0fada0815cd1e5f6
              entity:
                $ref: "#/components/schemas/user"
              result:
                type: object
                title: Operation result
                description: Result details for a single operation
                properties:
                  status:
                    type: string
                    enum:
                      - SUCCEEDED
                      - FAILED
                    title: Operation result status
                  detail:
                    type: string
                    title: Human readable message
                    description: Detailed message about the operation result
                    maxLength: 255
                    example: Account created successfully
                  context:
                    type: array
                    title: Detailed error information
                    description: |-
                      List of objects providing additional context
                      for errors or failures
                    maxItems: 1000
                    items:
                      type: object
                      title: Detailed error information
                      properties:
                        message:
                          type: string
                          title: Specific error details
                          maxLength: 255
                          example: Account not found
                        code:
                          type: string
                          title: Machine readable error code
                          maxLength: 255
                          example: ECONTRACT
                      required:
                        - message
                        - code
                required:
                  - status
                  - detail
                  - context
            required:
              - operation_id
              - action
          maxItems: 1000
      required:
        - status
        - operations
    bulk-operation-result-user:
      type: object
      title: Bulk Operation Result
      description: Represents the result of a single bulk operation on an entity
      properties:
        operation_id:
          type: string
          title: Matching operation_id or index from request
          description: |-
            Matches the operation_id from the request if provided,
            otherwise the index of the operation as a string
          maxLength: 255
          example: c5afa04bacd94662951a6f69
        action:
          type: string
          enum:
            - UPDATE
          description: Operation type (enum, not extensible)
        entity_id:
          type: string
          title: Entity identifier
          description: Entity identifier for UPDATE / DELETE operations
          maxLength: 50
          example: 676405eb0fada0815cd1e5f6
        entity:
          $ref: "#/components/schemas/user"
        result:
          type: object
          title: Operation result
          description: Result details for a single operation
          properties:
            status:
              type: string
              enum:
                - SUCCEEDED
                - FAILED
              title: Operation result status
            detail:
              type: string
              title: Human readable message
              description: Detailed message about the operation result
              maxLength: 255
              example: Account created successfully
            context:
              type: array
              title: Detailed error information
              description: |-
                List of objects providing additional context
