                                            maxLength: 2048
                                            default: >
                                              
                                              // Perform custom aggregation of
                                              the current event into the
                                              accumulated event.

                                              // The accumulated event is
                                              persisted across the entire
                                              aggregation window.

                                              // The function must return the
                                              accumulated event, which will be
                                              emitted when

                                              // the aggregation window elapses.

