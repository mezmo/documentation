                          properties:
                            sasl_mechanism:
                              type: string
                              enum:
                                - SCRAM-SHA-512
                                - SCRAM-SHA-256
                                - PLAIN
                              title: SASL
                              description: The Kafka SASL/SCRAM mechanism
                              default: PLAIN
                            sasl_username:
                              type: string
                              title: Username
                              description: The SASL/SCRAM username
                              minLength: 1
                            sasl_password:
                              type: string
                              title: Password
                              description: The SASL/SCRAM username
                              ui:
                                display_type: secret
                              minLength: 1
                          required:
                            - sasl_mechanism
                            - sasl_username
                            - sasl_password
                        required:
                          - brokers
                          - topics
                          - group_id
                          - decoding_codec
