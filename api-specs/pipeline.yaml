    alert-evaluation:
      title: Evaluation
      description: Multiple events (Log or Metric) will be collected into a single
        event (via aggregation) over a specified time window. That event is what
        the alert conditions will evaluate against. This section specifies how
        that aggregation should work. For Log event types, a `custom` JavaScript
        operation is required because the event shape is not standardized.
      additionalProperties:
        type: string
        title: Operation
        description: Specifies the type of aggregation operation to use with the window
          type and duration.
        ui:
          display_type: list
        oneOf:
          - const: DEFAULT
            label: add
            description: Adds new values together if they are of the same type. For counters
              and gauges the values are added together. For sets, this is a
              union of the elements. For distribution, the samples are
              concatenated. For histograms, values in the same bucket will be
              added together.
          - const: SUM
            label: sum
            description: Values are added together. Works for the GAUGE and COUNT metric
              types.
          - const: MIN
            label: minimum
            description: Get the minimum value for a series of events. Works for the GAUGE
              and COUNT metric types.
          - const: MAX
            label: maximum
            description: Get the maximum value for a series of events. Works for the GAUGE
              and COUNT metric types.
          - const: AVG
            label: average
            description: Values are averaged together. Works for the GAUGE and COUNT metric
              types.
          - const: SET_INTERSECTION
            label: set intersection
            description: The aggregate produces a set of unique values.
          - const: DIST_CONCAT
            label: distribution concatenation
            description: The aggregate produces a list of values combined together.
          - const: CUSTOM
            label: custom
            description: Use a custom script to perform aggregation.
      allOf:
        - if:
            allOf:
              - type: object
                properties:
                  event_type:
                    enum:
                      - log
                required:
                  - event_type
              - type: object
                properties:
                  alert_type:
                    not:
                      enum:
                        - absence
                required:
                  - alert_type
          then:
            properties:
              operation:
                title: Operation
                description: Specifies the type of aggregation operation to use with the window
                  type and duration.
                ui:
                  display_type: list
                oneOf:
                  - label: custom
                    description: Use a custom script to perform aggregation.
                    enum:
                      - CUSTOM
                default: CUSTOM
              group_by:
                type: array
                minItems: 1
                maxItems: 50
                uniqueItems: true
                title: Group By Field Paths
                description: When aggregating, group events based on matching values from each
                  of these field paths. Supports nesting via dot-notation.
                items:
                  type: string
                  maxLength: 100
                  title: Field
                  description: The dot-notated property path.
                  errorMessage:
                    pattern: Must be a valid data access syntax. [Syntax
                      Reference](https://docs.mezmo.com/telemetry-pipelines/syntax-for-editing-pipeline-component-configuration-values#data-fields)
                  ui:
                    display_type: field-reference
                  pattern: ^(?:timestamp|annotations|metadata|message|\.|(?:metadata|message|annotations)?(?:\.\w+\w*(?:\[\d+\])?|(?:\."(?:.+?)+"(:?\[\d+\])?))+)$
                ui:
                  default_hint:
                    - .name
                    - .namespace
                    - .tags
              event_timestamp:
                type: string
                title: Event Timestamp
                description: The path to a field on the event that contains a epoch timestamp
                  value. If an event does not have a timestamp field, events
                  will be associated to the wall clock value when the event is
                  processed.
                maxLength: 200
                errorMessage:
                  pattern: Must be a valid data access syntax. [Syntax
                    Reference](https://docs.mezmo.com/telemetry-pipelines/syntax-for-editing-pipeline-component-configuration-values#data-fields)
                ui:
                  default_hint: timestamp
                pattern: ^(?:timestamp|annotations|metadata|message|\.|(?:metadata|message|annotations)?(?:\.\w+\w*(?:\[\d+\])?|(?:\."(?:.+?)+"(:?\[\d+\])?))+)$
            required:
              - operation
        - if:
            allOf:
              - type: object
                properties:
                  event_type:
                    enum:
                      - metric
                required:
                  - event_type
              - type: object
                properties:
                  alert_type:
                    not:
                      enum:
                        - absence
                required:
                  - alert_type
          then:
            properties:
              operation:
                title: Operation
                description: Specifies the type of aggregation operation to use with the window
                  type and duration.
                ui:
                  display_type: list
                oneOf:
                  - label: add
                    description: Adds new values together if they are of the same type. For counters
                      and gauges the values are added together. For sets, this
                      is a union of the elements. For distribution, the samples
                      are concatenated. For histograms, values in the same
                      bucket will be added together.
                    enum:
                      - DEFAULT
                  - label: sum
                    description: Values are added together. Works for the GAUGE and COUNT metric
                      types.
                    enum:
                      - SUM
                  - label: minimum
                    description: Get the minimum value for a series of events. Works for the GAUGE
                      and COUNT metric types.
                    enum:
                      - MIN
                  - label: maximum
                    description: Get the maximum value for a series of events. Works for the GAUGE
                      and COUNT metric types.
                    enum:
                      - MAX
                  - label: average
                    description: Values are averaged together. Works for the GAUGE and COUNT metric
                      types.
                    enum:
                      - AVG
                  - label: set intersection
                    description: The aggregate produces a set of unique values.
                    enum:
                      - SET_INTERSECTION
                  - label: distribution concatenation
                    description: The aggregate produces a list of values combined together.
                    enum:
                      - DIST_CONCAT
                  - label: custom
                    description: Use a custom script to perform aggregation.
                    enum:
                      - CUSTOM
                default: SUM
              event_timestamp:
                not:
                  type: string
                  title: Event Timestamp
                  description: The path to a field on the event that contains a epoch timestamp
                    value. If an event does not have a timestamp field, events
                    will be associated to the wall clock value when the event is
                    processed.
                  maxLength: 200
                  errorMessage:
                    pattern: Must be a valid data access syntax. [Syntax
                      Reference](https://docs.mezmo.com/telemetry-pipelines/syntax-for-editing-pipeline-component-configuration-values#data-fields)
                  ui:
                    display_type: field-reference
                  pattern: ^(?:timestamp|annotations|metadata|message|\.|(?:metadata|message|annotations)?(?:\.\w+\w*(?:\[\d+\])?|(?:\."(?:.+?)+"(:?\[\d+\])?))+)$
            required:
              - operation
        - if:
            properties:
              operation:
                enum:
                  - CUSTOM
            required:
              - operation
          then:
            properties:
              script:
                type: string
                title: Script
                description: A custom JavaScript function that will control the aggregation. At
                  the time of flushing, this aggregation will become the emitted
                  event.
                ui:
                  display_type: code-editor
                  options:
                    language: js
                minLength: 1
                maxLength: 5000
                default: >
                  
                  // Receives the current event, metadata and an accumulator
                  object. Logic can be performed

                  // on the event properties and added to the accumulator object
                  for later analysis.

                  // The accumulator is persisted, and will become the emitted
                  event when

                  // conditions are true, OR if the time window naturally
                  expires. Those same conditions

                  // will also be evaluated against the emitted event to
                  determine if the alert should

                  // be triggered.


                  function alertAggregation(accum, event, metadata) {

                    // This function *must* return the accumulated event
                    return accum
                  }
            required:
              - script
        - if:
            properties:
              alert_type:
                enum:
                  - threshold
            required:
              - alert_type
          then:
            properties:
              conditional:
                title: Alert Conditions
                description: Evaluate these conditions against the aggregated event, and trigger
                  an alert if they are met. If the conditions are true, it will
                  also flush the current aggregated event and end the time
                  window.
                allOf:
                  - $ref: "#/components/schemas/alert-condition-group-threshold"
                ui:
                  display_type: rules-engine
                  options:
                    operators: alert-condition-group-threshold
        - if:
            properties:
              alert_type:
                enum:
                  - change
            required:
              - alert_type
          then:
            properties:
              conditional:
                title: Alert Conditions
                description: Evaluate these conditions against the aggregated event, and trigger
                  an alert if they are met. If the conditions are true, it will
                  also flush the current aggregated event and end the time
                  window.
                allOf:
                  - $ref: "#/components/schemas/alert-condition-group-change"
                ui:
                  display_type: rules-engine
                  options:
                    operators: alert-condition-group-change
        - if:
            properties:
              alert_type:
                enum:
                  - absence
            required:
              - alert_type
          then:
            properties:
              conditional:
                title: Alert Conditions
                description: No conditions are necessary for alerting on the absence of events.
                not:
                  anyOf:
                    - $ref: "#/components/schemas/alert-condition-group-threshold"
                    - $ref: "#/components/schemas/alert-condition-group-change"
                ui:
                  display_type: rules-engine
                  options:
                    hidden: true
              operation:
                not:
                  type: string
                  title: Operation
                  description: Specifies the type of aggregation operation to use with the window
                    type and duration.
                  ui:
                    display_type: list
                  oneOf:
                    - label: add
                      description: Adds new values together if they are of the same type. For counters
                        and gauges the values are added together. For sets, this
                        is a union of the elements. For distribution, the
                        samples are concatenated. For histograms, values in the
                        same bucket will be added together.
                      enum:
                        - DEFAULT
                    - label: sum
                      description: Values are added together. Works for the GAUGE and COUNT metric
                        types.
                      enum:
                        - SUM
                    - label: minimum
                      description: Get the minimum value for a series of events. Works for the GAUGE
                        and COUNT metric types.
                      enum:
                        - MIN
                    - label: maximum
                      description: Get the maximum value for a series of events. Works for the GAUGE
                        and COUNT metric types.
                      enum:
                        - MAX
                    - label: average
                      description: Values are averaged together. Works for the GAUGE and COUNT metric
                        types.
                      enum:
                        - AVG
                    - label: set intersection
                      description: The aggregate produces a set of unique values.
                      enum:
                        - SET_INTERSECTION
                    - label: distribution concatenation
                      description: The aggregate produces a list of values combined together.
                      enum:
                        - DIST_CONCAT
                    - label: custom
                      description: Use a custom script to perform aggregation.
                      enum:
                        - CUSTOM
              script:
                not:
                  type: string
                  title: Script
                  description: A custom JavaScript function that will control the aggregation. At
                    the time of flushing, this aggregation will become the
                    emitted event.
                  ui:
                    display_type: code-editor
                    options:
                      language: js
                  minLength: 1
                  maxLength: 5000
      properties:
        alert_type:
          title: Alert Type
          description: Specifies what kind of alert this should be.
          ui:
            display_type: list
          errorMessage: must be one of the allowed alert types
          oneOf:
            - label: Threshold Alert
              description: Trigger an alert when the evaluation is higher or lower than a set
                value.
              enum:
                - threshold
            - label: Change Alert
              description: Trigger an alert when there is a change in percentage or value
                thresholds.
              enum:
                - change
            - label: Absence Alert
              description: Trigger an alert when there is an absence of an event.
              enum:
                - absence
        event_type:
          title: Event Type
          description: The type of event is either a Log event or a Metric event.
          ui:
            display_type: list
          errorMessage: must be one of the allowed event types
          oneOf:
            - label: Metric
              description: Alert configuration based on a Metric event
              enum:
                - metric
            - label: Log
              description: Alert configuration based on a Log event
              enum:
                - log
        group_by:
          type: array
          minItems: 1
          maxItems: 50
          uniqueItems: true
          title: Group By Field Paths
          description: When aggregating, group events based on matching values from each
            of these field paths. Supports nesting via dot-notation.
          items:
            type: string
            maxLength: 100
            title: Field
            description: The dot-notated property path.
            errorMessage:
              pattern: Must be a valid data access syntax. [Syntax
                Reference](https://docs.mezmo.com/telemetry-pipelines/syntax-for-editing-pipeline-component-configuration-values#data-fields)
            ui:
              display_type: field-reference
            pattern: ^(?:timestamp|annotations|metadata|message|\.|(?:metadata|message|annotations)?(?:\.\w+\w*(?:\[\d+\])?|(?:\."(?:.+?)+"(:?\[\d+\])?))+)$
        window_type:
          type: string
          title: Window Type
          description: Sliding windows can overlap, whereas tumbling windows are disjoint.
            For example, a tumbling window has a fixed time span and any events
            that fall within the "window duration" will be used in the
            aggregate. In a sliding window, the aggregation occurs every "window
            duration" seconds after an event is encountered.
          enum:
            - tumbling
            - sliding
          default: tumbling
        window_duration_minutes:
          type: integer
          title: Window Duration (minutes)
          description: The duration of the aggregation window in minutes.
          default: 5
          minimum: 1
          maximum: 1440
        conditional:
          type: object
          additionalProperties: false
          properties:
            expressions:
              type: array
              items:
                type: object
            logical_operation:
              type: string
              enum:
                - AND
                - OR
      required:
        - alert_type
        - event_type
        - window_type
        - window_duration_minutes
    notification-channel-sink:
      type: object
      title: Alert Payload
      description: Determine the content of the alert and where to send it.
      additionalProperties: false
      properties:
        service:
          title: Service
          description: Configure a service to receive the payload. Currently supports
            Slack, PagerDuty, Webhook or Mezmo (Log Analysis). Where allowed,
            messagetemplating can be used. To use a template, surround field
            names with double curly braces, e.g., {{.my_field}} or
            {{."my-object".thing}}. See
            [documentation](https://docs.mezmo.com/telemetry-pipelines/syntax-for-editing-pipeline-component-configuration-values#data-fields)
            for more examples.
          additionalProperties:
            type: string
            title: URI
            format: uri
            errorMessage:
              format: Must be a valid URI
            description: The full URI where the payload is sent. This should include the
              protocol and host, but can also include the port, path, and any
              other valid part of a URI.
            minLength: 1
          allOf:
            - if:
                properties:
                  name:
                    enum:
                      - slack
                required:
                  - name
              then:
                properties:
                  uri:
                    type: string
                    title: URI
                    format: uri
                    errorMessage:
                      format: Must be a valid URI
                    description: The full URI where the payload is sent. This should include the
                      protocol and host, but can also include the port, path,
                      and any other valid part of a URI.
                    minLength: 1
                  message_text:
                    type: string
                    title: Message
                    minLength: 1
                    ui:
                      display_type: data-template
                      options:
                        multiline: true
                    description: The text to be sent as a Slack message.
                required:
                  - uri
                  - message_text
            - if:
                properties:
                  name:
                    enum:
                      - pager_duty
                required:
                  - name
              then:
                properties:
                  uri:
                    type: string
                    title: URI
                    format: uri
                    errorMessage:
                      format: Must be a valid URI
                    description: The full URI where the payload is sent. This should include the
                      protocol and host, but can also include the port, path,
                      and any other valid part of a URI.
                    minLength: 1
                  summary:
                    type: string
                    title: Summary
                    description: Summarize the alert details for PagerDuty.
                    minLength: 1
                    ui:
                      display_type: data-template
                  severity:
                    type: string
                    enum:
                      - INFO
                      - WARNING
                      - ERROR
                      - CRITICAL
                    title: Severity
                    description: The severity level of the alert.
                  source:
                    type: string
                    title: Source
                    description: The source of the alert.
                    minLength: 1
                    ui:
                      display_type: data-template
                  routing_key:
                    type: string
                    title: Routing Key
                    description: The service integration routing key.
                    minLength: 1
                    ui:
                      display_type: secret
                  event_action:
                    type: string
                    enum:
                      - trigger
                      - acknowledge
                      - resolve
                    title: Event Action
                    description: The event action associated with the alert.
                required:
                  - uri
                  - summary
                  - severity
                  - source
                  - routing_key
                  - event_action
            - if:
                properties:
                  name:
                    enum:
                      - webhook
                required:
                  - name
              then:
                properties:
                  uri:
                    type: string
                    title: URI
                    format: uri
                    errorMessage:
                      format: Must be a valid URI
                    description: The full URI where the payload is sent. This should include the
                      protocol and host, but can also include the port, path,
                      and any other valid part of a URI.
                    minLength: 1
                  method:
                    type: string
                    title: HTTP Method
                    description: The HTTP method to use for the request.
                    enum:
                      - post
                      - put
                      - patch
                      - delete
                      - get
                      - head
                      - options
                      - trace
                    ui:
                      default_hint: post
                  message_text:
                    type: string
                    title: Message
                    minLength: 1
                    ui:
                      display_type: data-template
                      options:
                        multiline: true
                    description: The Webhook payload to send. This can be a text string or
                      stringified JSON. If the message can be parsed as JSON, it
                      will be sent as such.
                  headers:
                    type: array
                    title: HTTP Headers
                    description: A list of key/value pairs to be included in the HTTP request.
                    items:
                      type: object
                      title: Headers
                      description: A key/value object describing a header name and its value.
                      additionalProperties: false
                      properties:
                        header_name:
                          type: string
                          title: Header Name
                          minLength: 1
                          description: The name of the header.
                        header_value:
                          type: string
                          title: Header Value
                          minLength: 1
                          maxLength: 1024
                          description: The value of the header.
                      required:
                        - header_name
                        - header_value
                    maxItems: 20
                  auth:
                    title: Authentication Options
                    description: Configures HTTP authentication
                    allOf:
                      - if:
                          properties:
                            strategy:
                              enum:
                                - basic
                        then:
                          properties:
                            user:
                              type: string
                              title: User
                              minLength: 1
                              description: The basic authentication user
                            password:
                              type: string
                              title: Password
                              minLength: 1
                              description: The basic authentication password
                              ui:
                                display_type: secret
                          required:
                            - user
                            - password
                      - if:
                          properties:
                            strategy:
                              enum:
                                - bearer
                        then:
                          properties:
                            token:
                              type: string
                              title: Token
                              minLength: 1
                              description: The bearer token
                              ui:
                                display_type: secret
                          required:
                            - token
                    properties:
                      strategy:
                        type: string
                        enum:
                          - basic
                          - bearer
                          - none
                        title: Strategy
                        description: Choose basic or token-based authentication.
                        default: none
                required:
                  - uri
                  - message_text
            - if:
                properties:
                  name:
                    enum:
                      - log_analysis
                required:
                  - name
              then:
                properties:
                  severity:
                    type: string
                    enum:
                      - INFO
                      - WARNING
                      - ERROR
                      - CRITICAL
                    title: Severity
                    description: The severity level of the alert.
                    default: INFO
                  subject:
                    type: string
                    title: Subject
                    description: A string to be used as the subject of the alert.
                    minLength: 1
                    maxLength: 200
                    ui:
                      display_type: data-template
                  body:
                    type: string
                    title: Body
                    description: A string to be used as the alert message body.
                    minLength: 1
                    maxLength: 1024
                    ui:
                      display_type: data-template
                  ingestion_key:
                    type: string
                    title: Ingestion Key
                    description: The key required to communicate to Log Analysis for sending the
                      alert.
                    ui:
                      display_type: mezmo-ingestion-key
                    minLength: 1
                required:
                  - severity
                  - subject
                  - body
                  - ingestion_key
          properties:
            name:
              title: Name
              description: The name of the service that will receive the notification.
              ui:
                display_type: list
              errorMessage: must be a valid service name
              oneOf:
                - label: Slack
                  enum:
                    - slack
                - label: PagerDuty
                  enum:
                    - pager_duty
                - label: Webhook
                  enum:
                    - webhook
                - label: Mezmo Log Analysis
                  enum:
                    - log_analysis
          required:
            - name
        throttling:
          type: object
          title: Throttling
          description: Only allow a certain number of notifications to be sent within a
            given time window.
          properties:
            window_secs:
              type: integer
              title: Window Seconds
              description: The time frame during which the number of notifications (set by the
                Threshold) is permitted.
              default: 60
              minimum: 1
            threshold:
              type: integer
              title: Threshold
              description: 'The maximum number of notifications allowed over the given time
                window set by "Window Seconds" (default: 1).'
              default: 1
              minimum: 1
      required:
        - service
        - throttling
paths:
  /pipeline/{pipeline_id}:
    delete:
      summary: Deletes a pipeline
      tags:
        - Pipeline Management
      description: Removes a pipeline from the account
      parameters:
        - schema:
            type: string
            format: uuid
          in: path
          name: pipeline_id
          required: true
      responses:
        "200":
          description: Default Response
    get:
      summary: Fetch pipeline confg
      tags:
        - Pipeline Management
      description: Retrieve a pipeline configuration
      parameters:
        - schema:
            type: string
            format: uuid
          in: path
          name: pipeline_id
          required: true
      responses:
        "200":
          description: Default Response
    put:
      summary: Update pipeline
      tags:
        - Pipeline Management
      description: Update pipeline properties, like title
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  pattern: ^[^<>"]+$
                  errorMessage: invalid title name
                  maxLength: 512
                deploy_type:
                  type: string
                  enum:
                    - saas
                    - local
                  default: saas
                deployment_groups:
                  type: array
                  maxItems: 10
                  items:
                    type: string
                    pattern: ^[a-zA-Z0-9-_]{1,256}$
              required:
                - title
        required: true
      parameters:
        - schema:
            type: string
            format: uuid
          in: path
          name: pipeline_id
          required: true
      responses:
        "200":
          description: Default Response
  /pipeline:
    get:
      summary: List all pipelines
      tags:
        - Pipeline Management
      description: List all pipelines for the account
      parameters:
        - schema:
            type: string
            enum:
              - ui
              - system
          in: query
          name: origin
          required: false
          description: Include Pipelines with a specific `origin`
      responses:
        "200":
          description: Default Response
    post:
      summary: Create pipeline
      tags:
        - Pipeline Management
      description: Creates a new pipeline (non published)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  pattern: ^[^<>"]+$
                  errorMessage: invalid title name
                  maxLength: 512
                deploy_type:
                  type: string
                  enum:
                    - saas
                    - local
                  default: saas
                deployment_groups:
                  type: array
                  maxItems: 10
                  items:
                    type: string
                    pattern: ^[a-zA-Z0-9-_]{1,256}$
              required:
                - title
        required: true
      responses:
        "200":
          description: Default Response
  /pipeline/account:
    get:
      summary: Get account details
      tags:
        - Account
      description: Get list of settings applied to an account
      responses:
        "200":
          description: Default Response
    patch:
      summary: Update account details
      tags:
        - Account
      description: Update account settings
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                local_deploy_config:
                  type: object
                  additionalProperties: false
                  ui:
                    feature_flag: pipeline-pulse
                  properties:
                    start_port:
                      type: integer
                      title: Start port
                      minimum: 1
                      maximum: 65535
                      description: The lower bound of the port range
                    end_port:
                      type: integer
                      exclusiveMinimum:
                        $data: 1/start_port
                      maximum: 65535
                      title: End port
                      description: The upper bound of the port range
                  required:
                    - start_port
                    - end_port
      responses:
        "200":
          description: Default Response
  /pipeline/{pipeline_id}/{component_kind}/{component_id}/alert/{alert_id}:
    delete:
      summary: Delete component alert
      tags:
        - Alerting
      description: Removes an alert attached to a pipeline component
      parameters:
        - schema:
            type: string
            enum:
              - node_alert
              - surge_detection_alert
            default: node_alert
          in: query
          name: component_alert_type
          required: false
        - schema:
            type: string
            format: uuid
          in: path
          name: pipeline_id
          required: true
        - schema:
            type: string
            enum:
              - source
              - transform
          in: path
          name: component_kind
          required: true
        - schema:
            type: string
            format: uuid
          in: path
          name: component_id
          required: true
        - schema:
            type: string
            format: uuid
          in: path
          name: alert_id
          required: true
      responses:
        "200":
          description: Default Response
    put:
      summary: Update component alert
      tags:
        - Alerting
      description: Update an alert attached to a pipeline component
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                inputs:
                  type: array
                  items:
                    type: string
                  minItems: 1
                alert_config:
                  type: object
                  properties:
                    general:
                      type: object
                    evaluation:
                      type: object
                    alert_payload:
                      type: object
                  required:
                    - general
                    - evaluation
                    - alert_payload
                active:
                  type: boolean
                component_alert_type:
                  type: string
                  enum:
                    - node_alert
                    - surge_detection_alert
                  default: node_alert
              required:
                - inputs
        required: true
      parameters:
        - schema:
            type: string
            format: uuid
          in: path
          name: pipeline_id
          required: true
        - schema:
            type: string
            enum:
              - source
              - transform
          in: path
          name: component_kind
          required: true
        - schema:
            type: string
            format: uuid
          in: path
          name: component_id
          required: true
        - schema:
            type: string
            format: uuid
          in: path
          name: alert_id
          required: true
      responses:
        "200":
          description: Default Response
  /pipeline/{pipeline_id}/alert/{alert_id}:
    get:
      summary: Fetch component alert
      tags:
        - Alerting
      description: Retrieves an alert attached to a pipeline component
      parameters:
        - schema:
            type: string
            enum:
              - node_alert
              - surge_detection_alert
            default: node_alert
          in: query
          name: component_alert_type
          required: false
        - schema:
            type: string
            format: uuid
          in: path
          name: pipeline_id
          required: true
        - schema:
            type: string
            format: uuid
          in: path
          name: alert_id
          required: true
      responses:
        "200":
          description: Default Response
  /pipeline/{pipeline_id}/alert:
    get:
      summary: List component alerts
      tags:
        - Alerting
      description: List of alerts attached to a pipeline's components
      parameters:
        - schema:
            type: string
            format: uuid
          in: path
          name: pipeline_id
          required: true
      responses:
        "200":
          description: Default Response
  /pipeline/{pipeline_id}/{component_kind}/{component_id}/alert:
    post:
      summary: Create component alert
      tags:
        - Alerting
      description: Create an alert attached to a pipeline component
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                inputs:
                  type: array
                  items:
                    type: string
                  minItems: 1
                alert_config:
                  type: object
                  properties:
                    general:
                      type: object
                    evaluation:
                      type: object
                    alert_payload:
                      type: object
                  required:
                    - general
                    - evaluation
                    - alert_payload
                component_alert_type:
                  type: string
                  enum:
                    - node_alert
                    - surge_detection_alert
                  default: node_alert
              required:
                - inputs
                - component_alert_type
        required: true
      parameters:
        - schema:
            type: string
            format: uuid
          in: path
          name: pipeline_id
          required: true
        - schema:
            type: string
            enum:
              - source
              - transform
          in: path
          name: component_kind
          required: true
        - schema:
            type: string
            format: uuid
          in: path
          name: component_id
          required: true
      responses:
        "200":
          description: Default Response
  /pipeline/audit-event:
    get:
      summary: Fetch audit events
      tags:
        - Pipeline Management
      description: Retrieve a paginated list of pipeline audit events for an account
      parameters:
        - schema:
            type: string
            format: date-time
          in: query
          name: from
          required: true
        - schema:
            type: string
            format: date-time
            default: 2022-01-01T00:00:00Z
          in: query
          name: to
          required: true
        - schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
          in: query
          name: page_size
          required: true
        - schema:
            type: integer
            minimum: 0
            default: 0
          in: query
          name: page_index
          required: true
      responses:
        "200":
          description: Default Response
  /pipeline/{pipeline_id}/event_metrics:
    get:
      summary: Get event metrics for a pipeline
      tags:
        - Metrics
      description: Query and fetch event metrics for a pipeline
      parameters:
        - schema:
            type: number
            minimum: 300
            maximum: 1296000
            title: Bucket size
            bucket_within_range:
              unit: seconds
              from_field: from
              to_field: to
          in: query
          name: bucket
          required: true
          description: The interval, in seconds, over which events will be grouped
        - schema:
            enum:
              - app
              - host
              - label
              - level
            default: app
            title: The field to group by
          in: query
          name: field
          required: false
          description: The field in the event to group events by
        - schema:
            type: string
            format: date-time
            title: Events from
          in: query
          name: from
          required: true
          description: The event metrics start date
        - schema:
            type: string
            format: date-time
            title: Events to
            date_time_greater_than:
              field: from
          in: query
          name: to
          required: true
          description: The event metrics end date
        - schema:
            type: boolean
            title: With metric changes
            default: false
          in: query
          name: with_changes
          required: false
          description: Include metric changes compared to the previous duration
        - schema:
            type: string
            format: uuid
          in: path
          name: pipeline_id
          required: true
      responses:
        "200":
          description: Default Response
  /pipeline/{pipeline_id}/export:
    post:
      summary: Trigger pipeline export
      tags:
        - Pipeline Export
      description: Prepare a pipeline for export into a terraform workspace.
      parameters:
        - schema:
            type: string
            format: uuid
          in: path
          name: pipeline_id
          required: true
      responses:
        "200":
          description: Default Response
  /pipeline/gateway-route/{gateway_route_id}:
    delete:
      summary: Delete gateway route
      tags:
        - Shared Sources
      description: Delete an unused gateway route. If the route is used by any active
        pipeline, an error will be returned.
      parameters:
        - schema:
            type: string
          in: path
          name: gateway_route_id
          required: true
      responses:
        "200":
          description: Default Response
    get:
      summary: Retrieve gateway route
      tags:
        - Shared Sources
      description: Retreive a gateway route
      parameters:
        - schema:
            type: string
          in: path
          name: gateway_route_id
          required: true
      responses:
        "200":
          description: Default Response
    patch:
      summary: Update gateway route property
      tags:
        - Shared Sources
      description: Patches a gateway route
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 512
                  pattern: ^[^<>"]+$
                  errorMessage: invalid title name
                description:
                  oneOf:
                    - type: string
                      minLength: 1
                      pattern: ^[^<>"]+$
                    - type: "null"
                  errorMessage: invalid description
                origin:
                  type: string
                  enum:
                    - ui
                    - system
                  description: The route origin
                legacy_routing:
                  type: boolean
              required:
                - title
        required: true
      parameters:
        - schema:
            type: string
          in: path
          name: gateway_route_id
          required: true
      responses:
        "200":
          description: Default Response
    put:
      summary: Update gateway route
      tags:
        - Shared Sources
      description: Updates a gateway route
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 512
                  pattern: ^[^<>"]+$
                  errorMessage: invalid title name
                description:
                  oneOf:
                    - type: string
                      minLength: 1
                    - type: "null"
                  errorMessage: invalid description
                type:
                  type: string
                  enum:
                    - http
                    - splunk-hec
                    - kinesis-firehose
                    - fluent
                    - logstash
                    - mezmo-agent
                    - mezmo-datadog-source
                    - webhook
                    - prometheus-remote-write
                    - open-telemetry-metrics
                    - open-telemetry-logs
                    - open-telemetry-traces
                legacy_routing:
                  type: boolean
              required:
                - title
                - type
        required: true
      parameters:
        - schema:
            type: string
          in: path
          name: gateway_route_id
          required: true
      responses:
        "200":
          description: Default Response
  /pipeline/gateway-route:
    get:
      summary: List all gateway routes
      tags:
        - Shared Sources
      description: List all of the shareable gateway routes for an account
      parameters:
        - schema:
            type: string
            format: uuid
          in: query
          name: id
          required: false
          description: Optional gateway route id to retrieve.
        - schema:
            type: string
            enum:
              - ui
              - system
          in: query
          name: origin
          required: false
          description: Filters the list of routes by origin.
      responses:
        "200":
          description: Default Response
    post:
      summary: Create gateway route
      tags:
        - Shared Sources
      description: Create a gateway route
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 512
                  pattern: ^[^<>"]+$
                  errorMessage: invalid title name
                description:
                  oneOf:
                    - type: string
                      minLength: 1
                      pattern: ^[^<>"]+$
                    - type: "null"
                  errorMessage: invalid description
                type:
                  type: string
                  enum:
                    - http
                    - splunk-hec
                    - kinesis-firehose
                    - fluent
                    - logstash
                    - mezmo-agent
                    - mezmo-datadog-source
                    - webhook
                    - prometheus-remote-write
                    - open-telemetry-metrics
                    - open-telemetry-logs
                    - open-telemetry-traces
                start_classification:
                  type: boolean
                  default: true
                legacy_routing:
                  type: boolean
                  default: true
              required:
                - title
                - type
        required: true
      responses:
        "200":
          description: Default Response
  /pipeline/grok-pattern:
    get:
      summary: Retrieve grok pattern
      tags:
        - Sampling and Simulation
      description: Retrieves a list of grok patterns available to use
      responses:
        "200":
          description: Default Response
  /pipeline/grok-pattern/simulate:
    post:
      summary: Simulate grok pattern
      tags:
        - Sampling and Simulation
      description: Simulate data flowing through a grok pattern
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                pattern:
                  type: string
                  errorMessage: must be a valid grok expression composed only by community
                    patterns
                  pattern: ^(?:%\{[A-Z_0-9]+(?::\w+){0,2}\}[\s,;:-]*)+$
                values:
                  type: array
                  items:
                    type: string
                  minItems: 1
              required:
                - pattern
                - values
        required: true
      responses:
        "200":
          description: Default Response
  /pipeline/health:
    get:
      summary: Summarize pipeline health for one or more pipelines
      tags:
        - Pipeline Management
      description: Returns overall ingestion health as well as pipeline-specific
        health, such as lag in a pipeline's sources.
      parameters:
        - schema:
            type: integer
            minimum: 1
            maximum: 60
            default: 15
          in: query
          name: interval_minutes
          required: false
          description: The window interval for measuring ingestion volume
        - schema:
            type: array
            items:
              type: string
              format: uuid
              description: A pipeline id
          in: query
          name: pipeline_ids
          required: false
          description: Return only pipelines with the given IDs
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    type: object
                    additionalProperties: true
                  data:
                    type: object
                    description: Overall health of data ingestion and pipeline sources
                    properties:
                      interval_minutes:
                        type: integer
                        description: The window interval for measuring ingestion volume
                      ingestion_health:
                        type: object
                        properties:
                          ingestion_metrics_status:
                            type: string
                            description: A success or failure message for the ability to fetch metrics
                              related to ingestion routes
                          routes:
                            type: array
                            description: Ingestion status code health metrics per route
                            items:
                              type: object
                              properties:
                                route:
                                  type: string
                                  description: The route path
                                health:
                                  type: array
                                  description: The health of a specific route measured by changes in status code
                                  items:
                                    type: object
                                    properties:
                                      status_code:
                                        type: integer
                                        description: The HTTP status code
                                      change_percent:
                                        type: number
                                        description: "The percentage change for the status code over time. The result is
                                          a comparison of the current interval
                                          and the same interval offset by
                                          `interval_minutes` ago. For example,
                                          when `{interval_minutes: 5,
                                          offset_minutes: 5}`, that calculates
                                          the percentage change in a 5-minute
                                          window from 5 minutes ago to a
                                          5-minute window 10 minutes ago."
                      pipeline_health:
                        type: object
                        properties:
                          lag_metrics_status:
                            type: string
                            description: A success or failure message for the ability to fetch lag metrics
                          pipelines:
                            type: array
                            description: All active and published pipelines. Inactive or unpublished
                              pipelines are not included.
                            items:
                              type: object
                              properties:
                                id:
                                  type: string
                                  format: uuid
                                  description: The pipeline id
                                title:
                                  type: string
                                  description: The pipeline title
                                published_at:
                                  type: string
                                  format: date-time
                                  description: The date/time of the pipeline's last publish (if at all)
                                sources:
                                  type: array
                                  description: Sources associated with this pipeline
                                  items:
                                    type: object
                                    properties:
                                      id:
                                        type: string
                                        description: The source id, which can also be the consumer group id
                                      type:
                                        type: string
                                        description: The type of source component
                                      title:
                                        type: string
                                        description: The title of the source component
                                      is_consumer_group:
                                        type: boolean
                                        description: Whether this source is a consumer group that could have lag
                                      lag_event_count:
                                        anyOf:
                                          - type: number
                                            description: The number of events lagging behind. If this value is `null`, then
                                              it could mean the source has never
                                              had consumers, or that the lag
                                              metrics were unavailable (check
                                              `lag_metrics_status`)
                                          - type: "null"
  /pipeline/{pipeline_id}/log-volume-reduction:
    post:
      summary: Log Volume Reduction
      tags:
        - Log Volume Reduction
      description: Post log volume reduction actions to a pipeline
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                place_before_transform_id:
                  type: string
                  format: uuid
                processor_title:
                  type: string
                actions:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    oneOf:
                      - type: object
                        required:
                          - drain
                      - type: object
                        required:
                          - field_summary
                    properties:
                      type:
                        type: string
                        enum:
                          - dedupe
                          - filter
                          - sample
                          - throttle
                          - drop-field
                      title:
                        oneOf:
                          - type: string
                            minLength: 1
                            maxLength: 512
                            pattern: ^[^<>"]+$
                          - type: "null"
                        errorMessage: invalid title name
                      drain:
                        type: string
                      field_summary:
                        type: object
                        properties:
                          field:
                            type: string
                            minLength: 1
                          value:
                            oneOf:
                              - type: string
                                minLength: 1
                              - type: "null"
                        required:
                          - field
                      description:
                        oneOf:
                          - type: string
                            minLength: 1
                            pattern: ^[^<>"]+$
                          - type: "null"
                        errorMessage: invalid description
                      user_config:
                        type: object
                    if:
                      properties:
                        type:
                          enum:
                            - drop-field
                    then:
                      allOf:
                        - type: object
                          required:
                            - field_summary
                        - type: object
                          properties:
                            field_summary:
                              type: object
                              properties:
                                value:
                                  type: "null"
                    else:
                      properties:
                        type:
                          not:
                            enum:
                              - drop-field
              required:
                - processor_title
                - actions
        required: true
      parameters:
        - schema:
            type: boolean
            default: false
          in: query
          name: create_new_classifier_analysis
          required: false
        - schema:
            type: string
            format: uuid
          in: path
          name: pipeline_id
          required: true
      responses:
        "200":
          description: Default Response
