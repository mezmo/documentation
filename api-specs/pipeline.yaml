  /pipeline/timestamp-format/simulate:
    post:
      summary: Simulate timestamp pattern
      tags:
        - Sampling and Simulation
      description: Simulate data with a timestamp format
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                format:
                  type: string
                  format: strftime_datetime
                  errorMessage: must be a valid strftime datetime format
                  minLength: 1
                values:
                  type: array
                  items:
                    type: string
                  minItems: 1
              required:
                - format
                - values
        required: true
      responses:
        "200":
          description: Default Response
  /pipeline/{pipeline_id}/transform/{pipeline_transform_id}:
    delete:
      summary: Remove transform
      tags:
        - Pipeline Nodes
      description: Removes transform from pipeline
      parameters:
        - schema:
            type: string
            format: uuid
          in: path
          name: pipeline_id
          required: true
        - schema:
            type: string
            format: uuid
          in: path
          name: pipeline_transform_id
          required: true
      responses:
        "200":
          description: Default Response
    get:
      summary: Fetch transform
      tags:
        - Pipeline Nodes
      description: Fetch transform configuration
      parameters:
        - schema:
            type: string
            format: uuid
          in: path
          name: pipeline_id
          required: true
        - schema:
            type: string
            format: uuid
          in: path
          name: pipeline_transform_id
          required: true
      responses:
        "200":
          description: Default Response
    put:
      summary: Update transform
      tags:
        - Pipeline Nodes
      description: Updates a transform of a pipeline
      requestBody:
        content:
          application/json:
            schema:
              type: object
              allOf:
                - if:
                    properties:
                      type:
                        enum:
                          - filter
                      deploy_type:
                        anyOf:
                          - enum:
                              - saas
                          - type: "null"
                    required:
                      - type
                  then:
                    properties:
                      user_config:
                        type: object
                        title: Filter
                        description: Define condition(s) to include or exclude events from the pipeline
                        additionalProperties: false
                        properties:
                          action:
                            title: Action
                            description: How to handle events matching this criteria
                            oneOf:
                              - label: Allow events matching this criteria
                                enum:
                                  - allow
                              - label: Drop events matching this criteria
                                enum:
                                  - drop
                            default: allow
                            ui:
                              display_type: radio-group
                          conditional:
                            allOf:
                              - $ref: "#condition-group"
                            title: Conditional
                            description: A group of expressions joined together by an and/or operator.
                            ui:
                              display_type: rules-engine
                        required:
                          - action
                          - conditional
                - if:
                    properties:
                      type:
                        enum:
                          - sample
                      deploy_type:
                        anyOf:
                          - enum:
                              - saas
                          - type: "null"
                    required:
                      - type
                  then:
                    properties:
                      user_config:
                        type: object
                        title: Sample
                        description: Sample data at a given rate, retaining only a subset of data events
                          for further processing.
                        additionalProperties: false
                        properties:
                          rate:
                            type: integer
                            title: Rate
                            description: The rate at which events will be forwarded, expressed as 1/N. For
                              example, `rate = 10` means 1 out of every 10
                              events will be forwarded and the rest will be
                              dropped
                            minimum: 2
                            maximum: 10000
                            default: 10
                          always_include:
                            title: Always Include
                            description: Certain events may always want to be included (not sampled),
                              regardless of the sample rate. Events matching
                              this criteria will always show up in the results.
                            additionalProperties:
                              type:
                                - string
                                - number
                            dependencies:
                              field:
                                - str_operator
                              str_operator:
                                - field
                            allOf:
                              - if:
                                  title: Operator
                                  properties:
                                    str_operator:
                                      type: string
                                      enum:
                                        - greater
                                        - greater_or_equal
                                        - less
                                        - less_or_equal
                                      ui:
                                        display_type: list-operators
                                      title: Operator
                                      description: The comparison operator
                                  required:
                                    - str_operator
                                then:
                                  title: Value
                                  properties:
                                    value:
                                      errorMessage:
                                        pattern: Value must be a number
                                      type:
                                        - string
                                        - number
                                      title: Value
                                      description: The value used in the expression, ie the "operand"
                                      minLength: 1
                                      pattern: ^\s*-?(\d*\.)?\d+\s*$
                                  required:
                                    - value
                              - if:
                                  title: Operator
                                  properties:
                                    str_operator:
                                      type: string
                                      enum:
                                        - greater
                                        - greater_or_equal
                                        - less
                                        - less_or_equal
                                        - equal
                                        - contains
                                        - is_ip_in_cidr_range
                                        - ends_with
                                        - starts_with
                                        - drain_matches
                                        - contains_token_term
                                        - contains_token_prefix
                                        - percent_change_greater
                                        - percent_change_greater_or_equal
                                        - percent_change_less
                                        - percent_change_less_or_equal
                                        - value_change_greater
                                        - value_change_greater_or_equal
                                        - value_change_less
                                        - value_change_less_or_equal
                                      ui:
                                        display_type: list-operators
                                      title: Operator
                                      description: The comparison operator
                                  required:
                                    - str_operator
                                then:
                                  title: Value
                                  properties:
                                    value:
                                      type:
                                        - string
                                        - number
                                      title: Value
                                      description: The value used in the expression, ie the "operand"
                                      minLength: 1
                                  required:
                                    - value
                              - if:
                                  title: Operator
                                  properties:
                                    str_operator:
                                      type: string
                                      enum:
                                        - contains
                                        - equal
                                        - ends_with
                                        - starts_with
                                        - drain_matches
                                        - contains_token_term
                                        - contains_token_prefix
                                      ui:
                                        display_type: list-operators
                                      title: Operator
                                  required:
                                    - str_operator
                                then:
                                  title: Case sensitive
                                  properties:
                                    case_sensitive:
                                      type: boolean
                                      title: Case sensitive
                                      description: Perform case sensitive comparison?
                                      default: true
