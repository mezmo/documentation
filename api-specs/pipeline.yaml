  /pipeline/{pipeline_id}/usage-threshold-alert/{usage_threshold_alert_id}:
    delete:
      summary: Remove usage threshold alert
      tags:
        - Alerting
      description: Removes an existing threshold alert
      parameters:
        - schema:
            type: string
            format: uuid
          in: path
          name: pipeline_id
          required: true
        - schema:
            type: string
            format: uuid
          in: path
          name: usage_threshold_alert_id
          required: true
      responses:
        "200":
          description: Default Response
    get:
      summary: Retrieves an existing usage threshold alert
      tags:
        - Alerting
      description: Returns usage threshold configuration
      parameters:
        - schema:
            type: string
            format: uuid
          in: path
          name: pipeline_id
          required: true
        - schema:
            type: string
            format: uuid
          in: path
          name: usage_threshold_alert_id
          required: true
      responses:
        "200":
          description: Default Response
    patch:
      summary: Partially update an existing threshold alert
      tags:
        - Alerting
      description: Update a part of usage threshold alert
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
              required:
                - enabled
        required: true
      parameters:
        - schema:
            type: string
            format: uuid
          in: path
          name: pipeline_id
          required: true
        - schema:
            type: string
            format: uuid
          in: path
          name: usage_threshold_alert_id
          required: true
      responses:
        "200":
          description: Default Response
    put:
      summary: Update threshold alert
      tags:
        - Alerting
      description: Replace an existing usage alert with this one
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              allOf:
                - if:
                    allOf:
                      - type: object
                        properties:
                          no_data:
                            not:
                              enum:
                                - true
                      - type: object
                        properties:
                          percent_decrease:
                            anyOf:
                              - enum:
                                  - 0
                              - type: "null"
                      - type: object
                        properties:
                          percent_increase:
                            anyOf:
                              - enum:
                                  - 0
                              - type: "null"
                  then:
                    properties:
                      threshold_bytes:
                        type: number
                        minimum: 1
                        errorMessage:
                          minimum: must be greater than or equal to 1
                    required:
                      - threshold_bytes
                - if:
                    allOf:
                      - type: object
                        properties:
                          no_data:
                            not:
                              enum:
                                - true
                      - type: object
                        properties:
                          percent_increase:
                            anyOf:
                              - enum:
                                  - 0
                              - type: "null"
                      - type: object
                        properties:
                          threshold_bytes:
                            anyOf:
                              - enum:
                                  - 0
                              - type: "null"
                  then:
                    properties:
                      percent_decrease:
                        type: number
                        minimum: 1
                        errorMessage:
                          minimum: must be greater than or equal to 1
                    required:
                      - percent_decrease
                - if:
                    allOf:
                      - type: object
                        properties:
                          no_data:
                            not:
                              enum:
                                - true
                      - type: object
                        properties:
                          percent_decrease:
                            anyOf:
                              - enum:
                                  - 0
                              - type: "null"
                      - type: object
                        properties:
                          threshold_bytes:
                            anyOf:
                              - enum:
                                  - 0
                              - type: "null"
                  then:
                    properties:
                      percent_increase:
                        type: number
                        minimum: 1
                        errorMessage:
                          minimum: must be greater than or equal to 1
                    required:
                      - percent_increase
              properties:
                data_window:
                  type: object
                  additionalProperties: false
                  title: Data period options
                  properties:
                    value:
                      $ref: "#alert_period_value"
                    unit:
                      $ref: "#alert_period_unit"
                  if:
                    properties:
                      unit:
                        title: Data period unit
                        enum:
                          - minute
                    required:
                      - unit
                  then:
                    properties:
                      value:
                        type: number
                        title: Data period value
                        minimum: 5
                    required:
                      - value
                  required:
                    - value
                    - unit
                max_daily_notifications:
                  $ref: "#alert_max_notifications"
                no_data:
                  type: boolean
                percent_decrease:
                  $ref: "#alert_percent_decrease"
                percent_increase:
                  $ref: "#alert_percent_increase"
                threshold_bytes:
                  $ref: "#alert_threshold_bytes"
                title:
                  $ref: "#alert_title"
                traffic_type:
                  $ref: "#alert_traffic_type"
                alert_channels:
                  $ref: "#alert_channels"
              required:
                - traffic_type
                - alert_channels
        required: true
      parameters:
        - schema:
            type: string
            format: uuid
          in: path
          name: pipeline_id
          required: true
      responses:
        "200":
          description: Default Response
