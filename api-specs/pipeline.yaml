                                    properties:
                                      options:
                                        allOf:
                                          - $ref: "#regex-parser-options"
                                        ui:
                                          display_type: regex-pattern
                                    required:
                                      - options
                                - if:
                                    properties:
                                      parser:
                                        enum:
                                          - parse_apache_log
                                  then:
                                    properties:
                                      options:
                                        $ref: "#apache-parser-options"
                                    required:
                                      - options
                                - if:
                                    properties:
                                      parser:
                                        enum:
                                          - parse_nginx_log
                                  then:
                                    properties:
                                      options:
