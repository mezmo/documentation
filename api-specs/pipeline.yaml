                  type: array
                  minItems: 1
                  items:
                    type: object
                    allOf:
                      - if:
                          properties:
                            type:
                              enum:
                                - filter
                            deploy_type:
                              anyOf:
                                - enum:
                                    - saas
                                - type: "null"
                          required:
                            - type
                        then:
                          properties:
                            user_config:
                              type: object
                              title: Filter
                              description: Define condition(s) to include or exclude events from the pipeline
                              additionalProperties: false
                              properties:
                                action:
                                  title: Action
                                  description: How to handle events matching this criteria
                                  oneOf:
                                    - label: Allow events matching this criteria
                                      enum:
                                        - allow
                                    - label: Drop events matching this criteria
                                      enum:
                                        - drop
                                  default: allow
                                  ui:
                                    display_type: radio-group
                                conditional:
                                  allOf:
                                    - $ref: "#condition-group"
                                  title: Conditional
                                  description: A group of expressions joined together by an and/or operator.
                                  ui:
                                    display_type: rules-engine
                              required:
                                - action
                                - conditional
                      - if:
                          properties:
                            type:
                              enum:
                                - sample
                            deploy_type:
                              anyOf:
                                - enum:
                                    - saas
                                - type: "null"
                          required:
                            - type
                        then:
                          properties:
                            user_config:
                              type: object
                              title: Sample
                              description: Sample data at a given rate, retaining only a subset of data events
                                for further processing.
                              additionalProperties: false
                              properties:
                                rate:
                                  type: integer
                                  title: Rate
                                  description: The rate at which events will be forwarded, expressed as 1/N. For
                                    example, `rate = 10` means 1 out of every 10
                                    events will be forwarded and the rest will
                                    be dropped
                                  minimum: 2
                                  maximum: 10000
                                  default: 10
                                always_include:
                                  title: Always Include
                                  description: Certain events may always want to be included (not sampled),
                                    regardless of the sample rate. Events
                                    matching this criteria will always show up
                                    in the results.
                                  additionalProperties:
                                    type:
                                      - string
                                      - number
                                  dependencies:
                                    field:
                                      - str_operator
                                    str_operator:
                                      - field
                                  allOf:
                                    - if:
                                        title: Operator
                                        properties:
                                          str_operator:
                                            type: string
                                            enum:
                                              - greater
                                              - greater_or_equal
                                              - less
                                              - less_or_equal
                                            ui:
                                              display_type: list-operators
                                            title: Operator
                                            description: The comparison operator
                                        required:
                                          - str_operator
                                      then:
                                        title: Value
                                        properties:
                                          value:
                                            errorMessage:
                                              pattern: Value must be a number
                                            type:
                                              - string
                                              - number
                                            title: Value
                                            description: The value used in the expression, ie the "operand"
                                            minLength: 1
                                            pattern: ^\s*-?(\d*\.)?\d+\s*$
                                        required:
                                          - value
                                    - if:
                                        title: Operator
                                        properties:
                                          str_operator:
                                            type: string
                                            enum:
                                              - greater
                                              - greater_or_equal
                                              - less
                                              - less_or_equal
                                              - equal
                                              - contains
                                              - is_ip_in_cidr_range
                                              - ends_with
                                              - starts_with
                                              - drain_matches
                                              - contains_token_term
                                              - contains_token_prefix
                                              - percent_change_greater
                                              - percent_change_greater_or_equal
                                              - percent_change_less
                                              - percent_change_less_or_equal
                                              - value_change_greater
                                              - value_change_greater_or_equal
                                              - value_change_less
                                              - value_change_less_or_equal
                                            ui:
                                              display_type: list-operators
                                            title: Operator
                                            description: The comparison operator
                                        required:
                                          - str_operator
                                      then:
                                        title: Value
                                        properties:
                                          value:
                                            type:
                                              - string
                                              - number
                                            title: Value
                                            description: The value used in the expression, ie the "operand"
                                            minLength: 1
                                        required:
                                          - value
                                    - if:
                                        title: Operator
                                        properties:
                                          str_operator:
                                            type: string
                                            enum:
                                              - contains
                                              - equal
                                              - ends_with
                                              - starts_with
                                              - drain_matches
                                              - contains_token_term
                                              - contains_token_prefix
                                            ui:
                                              display_type: list-operators
                                            title: Operator
                                        required:
                                          - str_operator
                                      then:
                                        title: Case sensitive
                                        properties:
                                          case_sensitive:
                                            type: boolean
                                            title: Case sensitive
                                            description: Perform case sensitive comparison?
                                            default: true
                                  properties:
                                    field:
                                      type: string
                                      title: Field
                                      description: The JSON field to use in a condition to always include in sampling
                                      pattern: ^(?:timestamp|annotations|metadata|message|\.|(?:metadata|message|annotations)?(?:\.\w+\w*(?:\[\d+\])?|(?:\."(?:.+?)+"(:?\[\d+\])?))+)$
                                      errorMessage:
                                        pattern: Must be a valid data access syntax. [Syntax
                                          Reference](https://docs.mezmo.com/telemetry-pipelines/syntax-for-editing-pipeline-component-configuration-values#data-fields)
                                      ui:
                                        display_type: field-reference
                                    str_operator:
                                      type: string
                                      enum:
                                        - greater
                                        - greater_or_equal
                                        - less
                                        - less_or_equal
                                        - equal
                                        - contains
                                        - is_ip_in_cidr_range
                                        - is_metric
                                        - is_array
                                        - is_boolean
                                        - is_empty
                                        - is_null
                                        - is_number
                                        - is_object
                                        - is_string
                                        - exists
                                        - ends_with
                                        - starts_with
                                        - contains_token_term
                                        - contains_token_prefix
                                        - regex_match
                                      ui:
                                        display_type: list-operators
                                      title: Operator
                                      description: The comparison operator
                                    negate:
                                      type: boolean
                                      default: false
                                      title: Negate
                                      description: Negate the comparison expression
                              required:
                                - rate
                      - if:
                          properties:
                            type:
                              enum:
                                - drop-fields
